# Python backend + Node frontend build in one Railway service.
# /opt/venv path is load-bearing: README console instructions reference it.
[phases.setup]
nixPkgs = ["python312", "nodejs_22"]

[phases.install]
cmds = [
  "python -m venv /opt/venv && /opt/venv/bin/pip install -r backend/requirements.txt",
  "cd frontend && npm ci",
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "cd backend && /opt/venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
